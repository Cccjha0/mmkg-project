# =========================
# Experiment Config: OpenBG-IMG Gate-Only (no residual)
# =========================

dataset:
  name: openbg_img
  train: datasets/openbg_img/raw/OpenBG-IMG_train.tsv
  dev: datasets/openbg_img/raw/OpenBG-IMG_dev.tsv
  test: datasets/openbg_img/raw/OpenBG-IMG_test.tsv
  cache_dir: cache/openbg_img

model:
  name: openbg_img_gated
  num_relations: 136
  use_layernorm: true
  use_fusion: true
  use_residual: false

training:
  lr: 0.0003
  img_dropout: 0.2

evaluation:
  chunk_size: 4096
  query_batch_size: 32

output:
  exp_name: openbg_img_gate_only
