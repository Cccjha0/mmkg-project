# =========================
# Experiment Config: OpenBG-IMG Gated Fusion (Vector Gate + Residual) Final
# =========================

dataset:
  name: openbg_img
  train: datasets/openbg_img/raw/OpenBG-IMG_train.tsv
  dev: datasets/openbg_img/raw/OpenBG-IMG_dev.tsv
  test: datasets/openbg_img/raw/OpenBG-IMG_test.tsv
  cache_dir: cache/openbg_img

model:
  name: openbg_img_gated
  num_relations: 136
  use_layernorm: true

training:
  lr: 0.0005
  epochs: 300
  eval_every: 2
  early_stop_patience: 10

evaluation:
  dev_eval_limit: 5000

output:
  exp_name: openbg_img_gated_vec_res_softplus
