# =========================
# Experiment Config: OpenBG-IMG Residual-Only (no fusion)
# =========================

dataset:
  name: openbg_img
  train: data/datasets/openbg_img/raw/OpenBG-IMG_train.tsv
  dev: data/datasets/openbg_img/raw/OpenBG-IMG_dev.tsv
  test: data/datasets/openbg_img/raw/OpenBG-IMG_test.tsv
  cache_dir: data/cache/openbg_img

model:
  name: openbg_img_gated
  num_relations: 136
  use_layernorm: true
  use_fusion: false
  use_residual: true

training:
  lr: 0.0005
  img_dropout: 0.1

evaluation:
  chunk_size: 4096
  query_batch_size: 32

output:
  exp_name: openbg_img_residual_only
