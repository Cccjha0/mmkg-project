# ==========================================
# Member A: Text-only ComplEx (Seed 1)
# ==========================================
system:
  seed: 1
  deterministic: False
  device: "mps"

dataset:
  name: "openbg500"
  train: "data/datasets/openbg500/raw/OpenBG500_train.tsv"
  dev: "data/datasets/openbg500/raw/OpenBG500_dev.tsv"
  test: "data/datasets/openbg500/raw/OpenBG500_test.tsv"
  cache_dir: "data/cache/openbg500"

model:
  name: "text_complex"
  embedding_dim: 256
  num_relations: 500
  bert_cache_path: "data/cache/openbg500/entity_bert_emb.pt"
  normalize_bert: true

evaluation:
  dev_eval_limit: 500
  chunk_size: 1024
  query_batch_size: 16

training:
  lr: 0.001
  batch_size: 2048
  neg_ratio: 10
  epochs: 100
  eval_every: 5
  early_stop_patience: 15

output:
  exp_name: "memberA_complex_v3/seed1"
