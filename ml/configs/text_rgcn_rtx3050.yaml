# =========================
# Experiment Config: Text-RGCN on RTX 3050
# =========================

dataset:
  train: data/datasets/openbg500/raw/OpenBG500_train.tsv
  dev: data/datasets/openbg500/raw/OpenBG500_dev.tsv
  test: data/datasets/openbg500/raw/OpenBG500_test.tsv
  cache_dir: data/cache/openbg500

model:
  name: text_rgcn
  num_relations: 500
  num_entities: 249746
  text_emb_dim: 768
  entity_emb_file: entity_bert_emb.pt
  hidden_dim: 256
  num_layers: 2
  num_bases: 8
  sample_neighbors: [15, 10]
  dropout: 0.1

training:
  lr: 0.001
  batch_size: 512
  neg_ratio: 5
  epochs: 200
  eval_every: 10
  early_stop_patience: 10

evaluation:
  filtered: true
  chunk_size: 2048
  query_batch_size: 8
  dev_eval_limit: 2000

output:
  root_dir: ml/artifacts/outputs
  exp_name: text_rgcn_rtx3050
  save_best_only: true

system:
  seed: 1
  device: cuda
  deterministic: false
