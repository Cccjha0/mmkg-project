# =========================
# Experiment Config: OpenBG-IMG Gated Fusion (Vector Gate + Residual + Relation-aware Gate)
# =========================

dataset:
  name: openbg_img
  train: data/datasets/openbg_img/raw/OpenBG-IMG_train.tsv
  dev: data/datasets/openbg_img/raw/OpenBG-IMG_dev.tsv
  test: data/datasets/openbg_img/raw/OpenBG-IMG_test.tsv
  cache_dir: data/cache/openbg_img

model:
  name: openbg_img_gated
  num_relations: 136
  use_layernorm: true
  use_fusion: true
  use_residual: true
  use_normalized_mix: true

training:
  lr: 0.0003
  adv_temperature: 2.0
  img_dropout: 0.2
  gate_reg_weight: 0.0001
  gate_reg_target: 0.5
  early_stop_patience: 10
  fusion_warmup_epochs: 0

evaluation:
  chunk_size: 4096
  query_batch_size: 32

output:
  exp_name: openbg_img_gated_vec_res_rel

inference:
  attribute_relations: [rel_0031, rel_0092, rel_0086, rel_0096, rel_0043]
